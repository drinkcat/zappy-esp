name: Continuous Integration

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - xiao_esp32c6
          - esp32c6_devkit
        action:
          - command: build
            args: --release
            features: true
          - command: fmt
            args: -- --check --color always
            features: false
          - command: clippy
            args: --all-targets --workspace -- -D warnings
            features: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src rustfmt clippy
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
      - name: Install ldproxy
        run: cargo install ldproxy
      - name: Run command
        run: cargo ${{ matrix.action.command }} ${{ matrix.action.features && format('--no-default-features --features {0}', matrix.board) || '' }} ${{ matrix.action.args }}
